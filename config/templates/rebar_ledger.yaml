template_id: rebar_ledger
sheet_pattern: "表9-2*钢筋*"
description: "钢筋管理台账"

headers:
  rows: [2]
  data_start_row: 3

hierarchy:
  column_name: "序  号"
  separator: "."

stop_rules:
  - type: cell_match
    patterns: ["^注：", "^注 :", "^说明：", "^更新"]
    columns: ["A"]
  - type: consecutive_empty_rows
    count: 3

columns:
  - db_field: drawing_number
    match_header: ["图纸编号"]
    type: varchar(100)
  - db_field: drawing_name
    match_header: ["图纸名称"]
    type: varchar(300)
  - db_field: rebar_diameter
    match_header: ["钢筋直径"]
    type: varchar(50)
  - db_field: rebar_length
    match_header: ["钢筋长度"]
    type: decimal(15,2)
  - db_field: rebar_count
    match_header: ["根数"]
    type: int
  - db_field: unit_weight
    match_header: ["单重"]
    type: decimal(15,4)
  - db_field: total_weight
    match_header: ["总重"]
    type: decimal(15,2)
  - db_field: connection_qty
    match_header: ["接头数量"]
    type: int
  - db_field: remark
    match_header: ["备注"]
    type: text
