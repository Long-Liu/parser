template_id: social_insurance
sheet_pattern: "表2*社会统筹*"
description: "社会统筹动态表"

headers:
  rows: [2, 3, 4]
  data_start_row: 5

hierarchy:
  column_name: "序号"
  separator: "."

stop_rules:
  - type: cell_match
    patterns: ["^注：", "^注 :", "^说明："]
    columns: ["A"]
  - type: cell_match
    patterns: ["^金额单位"]
    columns: ["A"]
  - type: cell_match
    patterns: ["^合计"]
    action: "last"

columns:
  - db_field: person_name
    match_header: ["姓名"]
    type: varchar(100)
  - db_field: department
    match_header: ["部门"]
    type: varchar(100)
  - db_field: position
    match_header: ["职位"]
    type: varchar(100)
  - db_field: contract_relation
    match_header: ["合同关系"]
    type: varchar(100)
  - db_field: actual_person_months
    match_header: ["截止到当前", "实际人月"]
    type: decimal(10,2)
  - db_field: actual_total_cost
    match_header: ["截止到当前", "实际总成本"]
    type: decimal(15,2)
  - db_field: subsequent_person_months
    match_header: ["后续发生", "后续人月数"]
    type: decimal(10,2)
  - db_field: subsequent_cost
    match_header: ["后续发生", "后续成本"]
    type: decimal(15,2)
  - db_field: estimated_person_months
    match_header: ["预计完工成本", "人月数"]
    type: decimal(10,2)
  - db_field: estimated_total_cost
    match_header: ["预计完工成本", "完工总成本"]
    type: decimal(15,2)

dynamic_columns:
  - db_prefix: monthly
    match_header: ["累计已发生", "2025年"]
    type: decimal(15,2)
  - db_prefix: monthly_2026
    match_header: ["后续发生", "2026年"]
    type: decimal(15,2)
