template_id: gross_profit
sheet_pattern: "毛利"
description: "毛利毛利率表"

headers:
  rows: [3, 4]
  data_start_row: 5

hierarchy:
  column_name: "序号"
  separator: "."

stop_rules:
  - type: cell_match
    patterns: ["^注：", "^注 :", "^说明："]
    columns: ["A"]
  - type: cell_match
    patterns: ["^金额单位"]
    columns: ["A"]

columns:
  - db_field: item_name
    match_header: ["项目名称"]
    type: varchar(200)
  - db_field: contract_price
    match_header: ["合同价"]
    type: decimal(15,2)
  - db_field: estimated_completion_price
    match_header: ["预计完工合同价"]
    type: decimal(15,2)
  - db_field: economic_assessment
    match_header: ["经济考核指标"]
    type: decimal(15,2)
  - db_field: estimated_quantity
    match_header: ["预计完工量指标"]
    type: decimal(15,2)
  - db_field: gross_profit_total
    match_header: ["清单量经济考核指标毛利", "合计"]
    type: decimal(15,2)
  - db_field: gross_profit_mgmt_fee
    match_header: ["清单量经济考核指标毛利", "电源工程公司本部管理费"]
    type: decimal(15,2)
  - db_field: gross_profit_net
    match_header: ["清单量经济考核指标毛利", "净毛利"]
    type: decimal(15,2)
  - db_field: gross_profit_rate
    match_header: ["经济考核指标毛利率"]
    type: decimal(15,10)
  - db_field: estimated_gross_profit_total
    match_header: ["预计完工量经济考核指标毛利", "合计"]
    type: decimal(15,2)
  - db_field: estimated_gross_profit_mgmt_fee
    match_header: ["预计完工量经济考核指标毛利", "电源工程公司本部管理费"]
    type: decimal(15,2)
  - db_field: estimated_gross_profit_net
    match_header: ["预计完工量经济考核指标毛利", "净毛利"]
    type: decimal(15,2)
  - db_field: estimated_gross_profit_rate
    match_header: ["预计完工量指标毛利率"]
    type: decimal(15,10)
  - db_field: remark
    match_header: ["备注"]
    type: text
  -   db_field: bid_revenue
      match_header: [ "投标", "预计完工结算" ]
      type: decimal(15,2)
  -   db_field: bid_cost
      match_header: [ "投标", "预计完工成本" ]
      type: decimal(15,2)
  -   db_field: bid_profit
      match_header: [ "投标", "预计毛利" ]
      type: decimal(15,2)
  -   db_field: bid_profit_rate
      match_header: [ "投标", "毛利率" ]
      type: decimal(15,10)
  -   db_field: indicator_revenue
      match_header: [ "指标", "预计完工结算" ]
      type: decimal(15,2)
  -   db_field: indicator_cost
      match_header: [ "指标", "预计完工成本" ]
      type: decimal(15,2)
  -   db_field: indicator_profit
      match_header: [ "指标", "预计毛利" ]
      type: decimal(15,2)
  -   db_field: indicator_profit_rate
      match_header: [ "指标", "毛利率" ]
      type: decimal(15,10)
  -   db_field: actual_revenue
      match_header: [ "截至当前实际", "累计已结算" ]
      type: decimal(15,2)
  -   db_field: actual_cost
      match_header: [ "截至当前实际", "累计已发生成本" ]
      type: decimal(15,2)
  -   db_field: actual_profit
      match_header: [ "截至当前实际", "当前实际毛利" ]
      type: decimal(15,2)
  -   db_field: actual_profit_rate
      match_header: [ "截至当前实际", "毛利率" ]
      type: decimal(15,10)
  -   db_field: forecast_revenue
      match_header: [ "预计完工", "预计完工结算" ]
      type: decimal(15,2)
  -   db_field: forecast_cost
      match_header: [ "预计完工", "预计完工成本" ]
      type: decimal(15,2)
  -   db_field: forecast_profit
      match_header: [ "预计完工", "预计毛利" ]
      type: decimal(15,2)
  -   db_field: forecast_profit_rate
      match_header: [ "预计完工", "毛利率" ]
      type: decimal(15,10)
