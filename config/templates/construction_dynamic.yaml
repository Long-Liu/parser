template_id: construction_dynamic
sheet_pattern: "表6*建筑工程*"
description: "建筑工程动态表"

headers:
  rows: [2, 3, 4]
  data_start_row: 5

hierarchy:
  column_name: "定额"
  separator: ""

stop_rules:
  - type: cell_match
    patterns: ["^注：", "^注 :", "^说明：", "^金额单位"]
    columns: ["A"]
  - type: cell_match
    patterns: ["^合计（含税）", '^合计\(含税\)']
    action: "last"

columns:
  - db_field: work_content
    match_header: ["工作内容"]
    type: varchar(300)
  - db_field: quota_code
    match_header: ["定额"]
    type: varchar(50)
  - db_field: project_name
    match_header: ["项目名称"]
    type: varchar(300)
  - db_field: project_feature
    match_header: ["项目特征"]
    type: text
  - db_field: unit
    match_header: ["计量单位"]
    type: varchar(50)
  - db_field: remark
    match_header: ["备注"]
    type: text
  - db_field: bill_qty
    match_header: ["清单工程量"]
    type: decimal(15,2)
  - db_field: subcontract_category
    match_header: ["分包策划"]
    type: varchar(200)
  - db_field: contract_unit_price
    match_header: ["主承接合同价", "综合单价"]
    type: decimal(15,2)
  - db_field: contract_total_price
    match_header: ["主承接合同价", "综合合价"]
    type: decimal(15,2)
  - db_field: device_ex_tax
    match_header: ["乙供设备"]
    type: decimal(15,2)
  - db_field: material_concrete
    match_header: ["材料费", "混凝土"]
    type: decimal(15,2)
  - db_field: material_rebar
    match_header: ["材料费", "钢筋"]
    type: decimal(15,2)
  - db_field: material_steel
    match_header: ["材料费", "钢材"]
    type: decimal(15,2)
  - db_field: material_iron
    match_header: ["材料费", "铁件"]
    type: decimal(15,2)
  - db_field: material_other
    match_header: ["材料费", "其他材料费"]
    type: decimal(15,2)
  - db_field: material_name
    match_header: ["材料名称"]
    type: varchar(200)
  - db_field: material_subtotal
    match_header: ["材料费", "小计"]
    type: decimal(15,2)
  - db_field: construction_fixed
    match_header: ["施工费", "固定费用"]
    type: decimal(15,2)
  - db_field: construction_adjustment
    match_header: ["施工费", "增减调整"]
    type: decimal(15,2)
  - db_field: construction_assessment
    match_header: ["施工费", "经济考核调整"]
    type: decimal(15,2)
  - db_field: construction_lighting
    match_header: ["施工费", "照明灯具甲供调减"]
    type: decimal(15,2)

dynamic_columns:
  - db_prefix: monthly
    match_header: ["2025年"]
    type: decimal(15,2)
  - db_prefix: monthly_2026
    match_header: ["2026年"]
    type: decimal(15,2)
