template_id: concrete_ledger
sheet_pattern: "表9-1*混凝土*"
description: "混凝土管理台账"

headers:
  rows: [2]
  data_start_row: 3

hierarchy:
  column_name: "序  号"
  separator: "."

stop_rules:
  - type: cell_match
    patterns: ["^注：", "^注 :", "^说明："]
    columns: ["A"]
  - type: consecutive_empty_rows
    count: 5

columns:
  - db_field: pour_number
    match_header: ["浇筑单编号"]
    type: varchar(100)
  - db_field: application_date
    match_header: ["申请时间"]
    type: varchar(50)
  - db_field: drawing_unit_name
    match_header: ["图纸单位工程名称"]
    type: varchar(300)
  - db_field: drawing_number
    match_header: ["图纸编号"]
    type: varchar(100)
  - db_field: drawing_name
    match_header: ["图纸名称"]
    type: varchar(300)
  - db_field: usage_location
    match_header: ["使用明细部位"]
    type: varchar(500)
  - db_field: concrete_grade
    match_header: ["混凝土标号"]
    type: varchar(100)
  - db_field: unit
    match_header: ["计量单位"]
    type: varchar(50)
  - db_field: design_qty
    match_header: ["图纸设计数量"]
    type: decimal(15,2)
  - db_field: pour_applied_qty
    match_header: ["申请浇筑数量"]
    type: decimal(15,2)
  - db_field: contract_scope
    match_header: ["施工合同划分范围"]
    type: varchar(200)
  - db_field: indicator_budget_qty
    match_header: ["指标预算数量"]
    type: decimal(15,2)
  - db_field: upstream_settlement_qty
    match_header: ["上游结算数量"]
    type: decimal(15,2)
  - db_field: actual_pour_date
    match_header: ["实际浇筑日期"]
    type: varchar(50)
  - db_field: actual_pour_hours
    match_header: ["实际浇筑时间"]
    type: varchar(50)
  - db_field: actual_pour_method
    match_header: ["实际浇筑方式"]
    type: varchar(100)
  - db_field: actual_pour_qty
    match_header: ["实际浇筑数量"]
    type: decimal(15,2)
  - db_field: settlement_qty
    match_header: ["采购合同约定计算方式的结算数量"]
    type: decimal(15,2)
  - db_field: supplier_name
    match_header: ["供应商名称"]
    type: varchar(200)
